<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleccionar perfil | Netflix Operations</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="profiles-body">

  <section class="profiles-screen" id="profilesScreen">
    <div class="profiles-heading">
      <h1>Selecciona el expositor inicial</h1>
      <p>Elige un integrante del equipo para ingresar al material de apoyo.</p>
    </div>

    <div class="profiles-grid">
      <button class="profile-card">
        <span class="avatar-frame">
          <img class="avatar" src="assets/armando.jpeg" alt="Foto de Armando Ávila">
        </span>
        <span>Armando Ávila</span>
      </button>

      <button class="profile-card">
        <span class="avatar-frame">
          <img class="avatar" src="assets/luis.jpeg" alt="Foto de Luis Ponce">
        </span>
        <span>Luis Ponce</span>
      </button>

      <button class="profile-card">
        <span class="avatar-frame">
          <img class="avatar" src="assets/marilyn.jpeg" alt="Foto de Marilyn Santana">
        </span>
        <span>Marilyn Santana</span>
      </button>

      <button class="profile-card">
        <span class="avatar-frame">
          <img class="avatar" src="assets/jose.jpeg" alt="Foto de José Flores">
        </span>
        <span>José Flores</span>
      </button>

      <button class="profile-card">
        <span class="avatar-frame">
          <img class="avatar" src="assets/cristhian.jpeg" alt="Foto de Cristhian Pluas">
        </span>
        <span>Cristhian Pluas</span>
      </button>
    </div>

    <p class="profile-note">
      La presentación continuará desde la pantalla principal del material.
    </p>
  </section>

  <div id="loader" class="profile-loader hidden">
    <h1>NETFLIX <span>OPERATIONS</span></h1>
    <div class="loader-bar"></div>
    <p class="loader-subtitle">Cargando presentación de IO...</p>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
